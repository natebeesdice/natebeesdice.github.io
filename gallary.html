<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Bee's Dice — Gallery</title>

<style>
    :root{
        --nav-bg: #0b0b0b;           /* top nav background (black) */
        --brand-yellow: #ffd24d;     /* logo yellow */
        --muted-yellow: #f3e9c7;     /* muted page base (soft yellow) */
        --muted-overlay: rgba(11,11,11,0.02);
        --text-on-muted: #0b0b0b;
        --white: #ffffff;
        --nav-height: 64px;
        --hex-size: 140px;
        --caption-bg: rgba(255,255,255,0.95);
        --caption-text: var(--text-on-muted);
        --panel-bg: #ffffff;
        --accent: var(--brand-yellow);
    }

    /* Reset-ish */
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{
        font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
        /* neutral, slightly muted background so the yellow brand pops without overwhelming */
        background:
            linear-gradient(180deg, rgba(243,239,226,0.98), rgba(243,234,211,0.98)),
            var(--muted-yellow);
        color:var(--text-on-muted);
        -webkit-font-smoothing:antialiased;
        -moz-osx-font-smoothing:grayscale;
        -webkit-tap-highlight-color: transparent;
    }

    /* Sticky nav */
    header{
        position:sticky;
        top:0;
        z-index:40;
        backdrop-filter: blur(6px);
        background: var(--nav-bg);
        border-bottom: 3px solid rgba(0,0,0,0.6);
        box-shadow: 0 4px 18px rgba(0,0,0,0.12);
    }
    .nav{
        height:var(--nav-height);
        display:flex;
        align-items:center;
        justify-content:space-between;
        gap:1rem;
        max-width:1150px;
        margin:0 auto;
        padding:0 1rem;
    }
    .brand{
        display:flex;
        align-items:center;
        gap:.6rem;
        color:var(--white);
        font-weight:700;
        text-decoration:none;
    }
    .brand .logo{
        width:36px;height:36px;display:inline-grid;place-items:center;
        background:var(--brand-yellow);
        color:var(--nav-bg);
        border-radius:6px;
        font-weight:800;
        box-shadow: 0 2px 12px rgba(0,0,0,0.25);
        border: 2px solid rgba(0,0,0,0.06);
    }
    nav ul{
        display:flex;
        gap:.6rem;
        list-style:none;
        align-items:center;
    }
    nav a{
        padding:.5rem .8rem;
        color: var(--white);
        text-decoration:none;
        border-radius:6px;
        font-weight:600;
        transition: all .15s ease;
    }
    nav a:hover{
        background: rgba(255,255,255,0.06);
        transform:translateY(-2px);
        color:var(--brand-yellow);
    }

    /* Mobile hamburger */
    .menu-toggle{display:none; background:transparent;border:0;padding:.4rem;border-radius:6px}
    .menu-toggle svg{width:28px;height:28px;color:var(--white)}

    main{min-height:calc(100vh - var(--nav-height)); padding:2rem 1rem 4rem; display:block;}
    .hero-header{
        max-width:1150px;
        margin:0 auto 1.4rem;
        display:flex;
        justify-content:space-between;
        align-items:center;
        gap:1rem;
        padding:0 1rem;
    }
    .hero-header h1{
        color:var(--text-on-muted);
        font-size:clamp(1.4rem, 2.6vw, 1.9rem);
    }
    .hero-header p{
        color: rgba(11,11,11,0.78);
        font-size:.95rem;
    }
    .hero-header .note {
        color: var(--accent);
        font-weight:700;
    }

    /* gallery grid */
    .gallery-wrap{
        max-width:1150px;
        margin:0 auto;
        padding:0 1rem;
    }
    .gallery-grid{
        display:grid;
        grid-template-columns: repeat(auto-fit, minmax(calc(var(--hex-size)), 1fr));
        gap:14px;
        justify-items:center;
        align-items:start;
    }

    .photo{
        width:var(--hex-size);
        display:flex;
        justify-content:center;
        align-items:center;
        position:relative;
    }

    .hex {
        width:100%;
        aspect-ratio: 1 / 1;
        clip-path: polygon(25% 6.7%, 75% 6.7%, 100% 50%, 75% 93.3%, 25% 93.3%, 0% 50%);
        background: var(--white); /* keep cards white so page doesn't read as a single yellow field */
        border: 1px solid rgba(0,0,0,0.06);
        display:flex;
        align-items:center;
        justify-content:center;
        overflow:hidden;
        border-radius:6px;
        cursor:pointer;
        transition: transform .18s ease, box-shadow .18s ease;
    }
    .hex img{
        width:120%;
        height:120%;
        object-fit:cover;
        display:block;
        transform:translateY(0);
        transition: transform .35s ease;
        pointer-events:none;
        filter: saturate(0.98) contrast(0.99) brightness(0.99);
    }
    .hex:hover{transform:translateY(-6px); box-shadow: 0 12px 28px rgba(11,11,11,0.12)}
    .hex:hover img{transform:scale(1.05)}
    .caption {
        position:absolute;
        bottom:8px;
        left:8px;
        right:8px;
        display:flex;
        justify-content:space-between;
        align-items:center;
        gap:.4rem;
        font-size:.82rem;
        color:var(--caption-text);
        background: var(--caption-bg);
        padding:.45rem .6rem;
        border-radius:8px;
        border:1px solid rgba(0,0,0,0.04);
        backdrop-filter: blur(3px);
        box-shadow: 0 6px 18px rgba(11,11,11,0.06);
        font-weight:600;
    }

    /* modal / lightbox */
    .lightbox {
        position:fixed;
        inset:0;
        display:none;
        place-items:center;
        background: rgba(11,11,11,0.88);
        z-index:120;
    }
    .lightbox[aria-hidden="false"]{display:grid}
    .lightbox .panel{
        max-width:1100px;
        width:calc(100% - 3rem);
        max-height:90vh;
        background: var(--panel-bg);
        border-radius:12px;
        padding:12px;
        display:flex;
        gap:12px;
        align-items:center;
        justify-content:center;
        position:relative;
        box-shadow:0 20px 60px rgba(0,0,0,0.45);
    }
    .lightbox img{
        max-width:100%;
        max-height:80vh;
        width:auto;
        height:auto;
        display:block;
        border-radius:8px;
        box-shadow: 0 10px 40px rgba(11,11,11,0.12);
    }
    .lb-close{
        position:absolute;
        top:8px;
        right:8px;
        background:transparent;border:0;color:var(--text-on-muted);font-weight:700;padding:.4rem;border-radius:6px;cursor:pointer;
    }
    .lb-nav{
        position:absolute;
        top:50%;
        transform:translateY(-50%);
        font-size:1.6rem;
        color:rgba(0,0,0,0.9);
        background:transparent;border:0;padding:.6rem;border-radius:8px;cursor:pointer;
    }
    .lb-prev{left:12px}
    .lb-next{right:12px}

    /* Responsive tweaks */
    @media (max-width:980px){
        :root{--hex-size:110px}
        .hero-header{flex-direction:column;align-items:flex-start;gap:.6rem;padding:0 1rem 8px}
        nav ul{display:none}
        .menu-toggle{display:inline-flex}
        nav ul.open{display:flex;flex-direction:column;position:absolute;right:1rem;top:calc(var(--nav-height) + 8px);background:var(--nav-bg);padding:.6rem;border-radius:8px;box-shadow:0 8px 30px rgba(0,0,0,0.25)}
    }
    @media (max-width:520px){
        :root{--hex-size:92px}
        .gallery-grid{gap:10px}
        .caption{font-size:.7rem}
    }
</style>
</head>
<body>
<header>
  <div class="nav">
    <a class="brand" href="#">
      <span class="logo" aria-hidden="true">BD</span>
      <span class="name">Bee's Dice</span>
    </a>

    <nav>
      <button class="menu-toggle" aria-label="Toggle menu" id="menuToggle">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/></svg>
      </button>

      <ul id="navList">
        <li><a href="gallary.html">Gallery</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Contact</a></li>
      </ul>
    </nav>
  </div>
</header>

<main>
  <div class="hero-header">
    <div>
      <h1>Bee's Dice — Gallery</h1>
      <p>Hexagonal gallery with muted yellow branding. Click any image to open the lightbox.</p>
    </div>
    <div class="note">Curated stock shots</div>
  </div>

  <section class="gallery-wrap" aria-label="Image gallery">
    <div class="gallery-grid" id="gallery">
      <!-- A handful of sample images (Unsplash / Picsum) -->
      <figure class="photo">
        <div class="hex" data-index="0" tabindex="0" role="button" aria-label="Open image 1">
          <img src="https://picsum.photos/id/1015/800/800" alt="Landscape 1" loading="lazy">
        </div>
        <figcaption class="caption">Landscape <span>• 1</span></figcaption>
      </figure>

      <figure class="photo">
        <div class="hex" data-index="1" tabindex="0" role="button" aria-label="Open image 2">
          <img src="https://picsum.photos/id/1025/800/800" alt="Dog portrait" loading="lazy">
        </div>
        <figcaption class="caption">Portrait <span>• 2</span></figcaption>
      </figure>

      <figure class="photo">
        <div class="hex" data-index="2" tabindex="0" role="button" aria-label="Open image 3">
          <img src="https://picsum.photos/id/1031/800/800" alt="Mountain" loading="lazy">
        </div>
        <figcaption class="caption">Mountain <span>• 3</span></figcaption>
      </figure>

      <figure class="photo">
        <div class="hex" data-index="3" tabindex="0" role="button" aria-label="Open image 4">
          <img src="https://picsum.photos/id/1043/800/800" alt="Sea" loading="lazy">
        </div>
        <figcaption class="caption">Sea <span>• 4</span></figcaption>
      </figure>

      <figure class="photo">
        <div class="hex" data-index="4" tabindex="0" role="button" aria-label="Open image 5">
          <img src="https://picsum.photos/id/1056/800/800" alt="City" loading="lazy">
        </div>
        <figcaption class="caption">City <span>• 5</span></figcaption>
      </figure>

      <figure class="photo">
        <div class="hex" data-index="5" tabindex="0" role="button" aria-label="Open image 6">
          <img src="https://picsum.photos/id/1067/800/800" alt="Forest" loading="lazy">
        </div>
        <figcaption class="caption">Forest <span>• 6</span></figcaption>
      </figure>

      <figure class="photo">
        <div class="hex" data-index="6" tabindex="0" role="button" aria-label="Open image 7">
          <img src="https://picsum.photos/id/1074/800/800" alt="Flowers" loading="lazy">
        </div>
        <figcaption class="caption">Flowers <span>• 7</span></figcaption>
      </figure>

      <figure class="photo">
        <div class="hex" data-index="7" tabindex="0" role="button" aria-label="Open image 8">
          <img src="https://picsum.photos/id/1084/800/800" alt="Desert" loading="lazy">
        </div>
        <figcaption class="caption">Desert <span>• 8</span></figcaption>
      </figure>
    </div>
  </section>
</main>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" aria-hidden="true">
  <div class="panel" role="dialog" aria-modal="true">
    <button class="lb-close" id="lbClose" title="Close (Esc)">✕</button>
    <button class="lb-nav lb-prev" id="lbPrev" aria-label="Previous image">◀</button>
    <img src="" alt="" id="lbImage">
    <button class="lb-nav lb-next" id="lbNext" aria-label="Next image">▶</button>
  </div>
</div>

<script>
  // Simple gallery lightbox + mobile menu toggle
  (function(){
    const galleryImgs = Array.from(document.querySelectorAll('.hex img'));
    const hexButtons = Array.from(document.querySelectorAll('.hex'));
    const lightbox = document.getElementById('lightbox');
    const lbImage = document.getElementById('lbImage');
    const lbClose = document.getElementById('lbClose');
    const lbPrev = document.getElementById('lbPrev');
    const lbNext = document.getElementById('lbNext');
    let current = 0;

    function open(index){
      current = index;
      const src = galleryImgs[current].src;
      const alt = galleryImgs[current].alt || '';
      lbImage.src = src;
      lbImage.alt = alt;
      lightbox.setAttribute('aria-hidden','false');
      document.body.style.overflow = 'hidden';
    }
    function close(){
      lightbox.setAttribute('aria-hidden','true');
      lbImage.src = '';
      document.body.style.overflow = '';
    }
    function show(n){
      current = (n + galleryImgs.length) % galleryImgs.length;
      lbImage.src = galleryImgs[current].src;
      lbImage.alt = galleryImgs[current].alt || '';
    }

    hexButtons.forEach(btn => {
      const idx = Number(btn.dataset.index);
      btn.addEventListener('click', () => open(idx));
      btn.addEventListener('keydown', (e) => { if(e.key === 'Enter' || e.key === ' ') { e.preventDefault(); open(idx); }});
    });

    lbClose.addEventListener('click', close);
    lightbox.addEventListener('click', (e) => { if (e.target === lightbox) close(); });
    lbPrev.addEventListener('click', () => show(current - 1));
    lbNext.addEventListener('click', () => show(current + 1));

    window.addEventListener('keydown', (e) => {
      if (lightbox.getAttribute('aria-hidden') === 'false') {
        if (e.key === 'Escape') close();
        if (e.key === 'ArrowLeft') show(current - 1);
        if (e.key === 'ArrowRight') show(current + 1);
      }
    });

    // Mobile menu toggle
    const menuToggle = document.getElementById('menuToggle');
    const navList = document.getElementById('navList');
    menuToggle && menuToggle.addEventListener('click', () => navList.classList.toggle('open'));
  })();
</script>
</body>
</html>
